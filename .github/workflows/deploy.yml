# Simple workflow for deploying static content to GitHub Pages
name: Deploy main and uat branches to Pages

on:
  # Runs on pushes to both main and uat branches
  push:
    branches:
      - main
      - uat

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # Check out the main branch and put it at '/'
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
      # Check out the uat branch and put it at '/uat'
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: uat
          path: uat
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload everything that's been checked out to GitHub Pages
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
